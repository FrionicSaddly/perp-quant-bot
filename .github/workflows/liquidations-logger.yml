name: liquidations-logger

# Streams Bybit perp liquidation events over WebSocket in bounded bursts, appending
# to a single parquet on the `liquidations-data` branch. Liquidation cascades are a
# strong short-horizon signal; sporadic, so empty windows are normal. Free for
# public repos.

on:
  schedule:
    - cron: "*/15 * * * *"   # every ~15 min (GitHub min is 5; runs may be delayed)
  workflow_dispatch:
    inputs:
      duration:
        description: "seconds to stream"
        default: "660"

concurrency:
  group: liquidations-logger
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: pip install --quiet -e .

      - name: Restore previous data (if the data branch exists)
        run: |
          git fetch origin liquidations-data || true
          if git rev-parse --verify origin/liquidations-data >/dev/null 2>&1; then
            git show origin/liquidations-data:liquidations_log.parquet > liquidations_log.parquet || true
          fi

      - name: Stream liquidations burst
        run: |
          python scripts/ci_liquidations_poll.py \
            --out liquidations_log.parquet \
            --duration "${{ github.event.inputs.duration || '660' }}"

      - name: Commit data to the liquidations-data branch (skip if unchanged)
        run: |
          if [ ! -f liquidations_log.parquet ]; then
            echo "no data file; nothing to push"; exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BLOB=$(git hash-object -w liquidations_log.parquet)
          PREV=$(git rev-parse --verify "origin/liquidations-data:liquidations_log.parquet" 2>/dev/null || true)
          if [ "$BLOB" = "$PREV" ]; then
            echo "no new liquidations; nothing to commit"; exit 0
          fi
          TREE=$(printf '100644 blob %s\tliquidations_log.parquet\n' "$BLOB" | git mktree)
          if PARENT=$(git rev-parse --verify origin/liquidations-data 2>/dev/null); then
            COMMIT=$(git commit-tree "$TREE" -p "$PARENT" -m "liquidations burst $(date -u +%FT%TZ)")
          else
            COMMIT=$(git commit-tree "$TREE" -m "liquidations init $(date -u +%FT%TZ)")
          fi
          git push origin "$COMMIT:refs/heads/liquidations-data"
          echo "pushed $COMMIT to liquidations-data"
